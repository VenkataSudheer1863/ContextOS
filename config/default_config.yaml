context:
  max_tokens: 8192
  max_working_memory_items: 50
  compression_ratio: 0.40
  retrieval_top_k: 20
  rerank_top_k: 10

scheduler:
  algorithm: greedy
  weights:
    relevance: 0.40
    recency: 0.25
    importance: 0.20
    novelty: 0.15
  decay_lambda: 0.0001

governance:
  forgetting_threshold: 0.10
  promotion_threshold: 0.70
  compression_trigger: 0.80
  retention_hours: 72

embedding:
  model: BAAI/bge-m3
  fallback_model: intfloat/e5-large-v2
  cache_size: 10000
  batch_size: 64
  device: auto

llm:
  primary: gpt-oss-20b
  fallback: qwen3
  max_tokens: 2048
  temperature: 0.7

storage:
  backend: qdrant
  host: localhost
  port: 6333
  collection_prefix: contextos

database:
  url: postgresql://localhost:5432/contextos
  pool_size: 10

observability:
  mlflow_uri: http://localhost:5000
  otel_endpoint: http://localhost:4318
